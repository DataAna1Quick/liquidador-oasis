<!-- Liquidador Oasis — frontend real. Mismo template del Quick Design System
     (templates/liquidacion/index.html) con el loader apuntando a /ds y el
     PayrollScreen cableado a la API del backend (servidor.py). -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick · Liquidador Oasis</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script>
// ds-base.js del export, con base re-apuntada al mount /ds del backend.
(() => {
  const base = '/ds';
  for (const p of ['styles.css']) {
    const l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = base + '/' + p;
    document.head.appendChild(l);
  }
  const s = document.createElement('script');
  s.src = base + '/_ds_bundle.js';
  s.onerror = () => console.error('No se pudo cargar el bundle del design system: ' + s.src);
  document.head.appendChild(s);
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/frontend/PayrollScreen.jsx"></script>
</body>
</html>
